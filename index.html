<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>monblanproject</title>

    <link rel="icon" type="image/png" href="public/img/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="public/img/favicon/favicon.svg" />
    <link rel="shortcut icon" href="public/img/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="public/img/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="public/img/favicon/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&family=Roboto:wght@100..900&display=swap" rel="stylesheet">

    <script src="https://code.iconify.design/iconify-icon/2.0.0/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="src/less/main.less">

</head>
<body>

    <div class="page">
        <div class="blob blob--top"></div>
        <div class="blob blob--bottom"></div>

        <header>
            <div class="header__wrap">
                <a class="header__logo" href="#">
                    <svg width="138" height="138" viewBox="0 0 138 138" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M56.5 7.21688C64.235 2.75106 73.765 2.75106 81.5 7.21688L116.256 27.2831C123.991 31.7489 128.756 40.0021 128.756 48.9338V89.0662C128.756 97.9979 123.991 106.251 116.256 110.717L81.5 130.783C73.765 135.249 64.235 135.249 56.5 130.783L21.7442 110.717C14.0092 106.251 9.24425 97.9979 9.24425 89.0662V48.9338C9.24425 40.0021 14.0092 31.7489 21.7442 27.2831L56.5 7.21688Z" fill="white"/>
                        <path d="M128.756 88.5317V89.0662C128.756 97.9979 123.991 106.251 116.256 110.717L81.5 130.783C73.765 135.249 64.235 135.249 56.5 130.783L21.7442 110.717C21.1716 110.386 20.6152 110.035 20.0758 109.664L17.5 101L26 68L33.5 56L55.5 78.5L82.5 38.5L128.756 88.5317Z" fill="#066C61"/>
                        <path d="M18.1726 108.216C14.6282 105.242 11.9954 101.354 10.5392 97.0092L10.5 96.5C11.6667 83.5 16.7 56.8 27.5 54C41.5 50.3704 48.5 96.5 48.5 96.5C48.5 96.5 54.7204 32.2561 74 33.5C89.5 34.5 95.5 66.5 91.5 125L91.4793 125.022L81.5 130.783C78.1083 132.741 74.3715 133.841 70.5923 134.082C77.5658 121.943 76.9064 74.0186 73.5 56.5C71.5082 62.0157 69.939 70.5009 68.2456 79.6574C64.4128 100.382 59.9439 124.546 48.5 125.5C48.0761 125.535 47.6559 125.513 47.2396 125.437L43.4536 123.251C36.248 116.272 30.6804 94.8558 28.5 83C28.103 93.7194 24.061 105.982 22.0451 110.891L21.7442 110.717C21.4834 110.566 21.2259 110.411 20.9718 110.252L18.1726 108.216Z" fill="#B3DBC9"/>
                    </svg>
                </a>
                <div class="header__info">
                <div class="header__top">
                    <div class="header__name">monblanproject</div>
                    <span class="header__start-date">Start on  03-07-2026</span>
                </div>
                <div class="header__stats">
                    <span class="header__stat"><strong data-posts="">870</strong><span>posts</span></span>
                    <span class="header__stat"><strong data-followers="">11,787</strong><span>followers</span></span>
                    <span class="header__stat"><strong data-following>112</strong><span>following</span></span>
                </div>
                <div class="header__filters">
                    <label class="header__filter-label">Date</label>
                    <div class="header__date-input">
                        <input type="text" class="date-picker" id="dateFrom" placeholder="from" readonly>
                        <button class="date-clear" type="button" aria-label="Clear date">
                            <iconify-icon icon="bx:bx-plus" width="24" height="24"></iconify-icon>
                        </button>
                        <button class="date-calendar" type="button" aria-label="Open calendar">
                            <iconify-icon icon="bx:bx-calendar" width="22" height="22"></iconify-icon>
                        </button>
                    </div>
                    <div class="header__date-input">
                        <input type="text" class="date-picker" id="dateTo" placeholder="to" readonly>
                        <button class="date-clear" type="button" aria-label="Clear date">
                            <iconify-icon icon="bx:bx-plus" width="24" height="24"></iconify-icon>
                        </button>
                        <button class="date-calendar" type="button" aria-label="Open calendar">
                            <iconify-icon icon="bx:bx-calendar" width="22" height="22"></iconify-icon>
                        </button>
                    </div>
                </div>
            </div>
            </div>
        </header>

        <main class="main_wrap">
            <section class="main">
                <div class="view-toggle">
                    <button class="view-toggle__btn view-toggle__btn--tiles active" data-view="tiles" aria-label="Tiles view">
                        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="6" height="6" fill="#C8C8C8"/>
                            <rect x="8" width="6" height="6" fill="#C8C8C8"/>
                            <rect x="16" width="6" height="6" fill="#C8C8C8"/>
                            <rect y="8" width="6" height="6" fill="#C8C8C8"/>
                            <rect y="16" width="6" height="6" fill="#C8C8C8"/>
                            <rect x="8" y="8" width="6" height="6" fill="#C8C8C8"/>
                            <rect x="8" y="16" width="6" height="6" fill="#C8C8C8"/>
                            <rect x="16" y="8" width="6" height="6" fill="#C8C8C8"/>
                            <rect x="16" y="16" width="6" height="6" fill="#C8C8C8"/>
                        </svg>

                    </button>
                    <button class="view-toggle__btn view-toggle__btn--rows" data-view="rows" aria-label="Rows view">
                        <svg width="24" height="22" viewBox="0 0 24 22" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <rect width="6" height="6" fill="#C8C8C8"/>
                            <rect y="8" width="6" height="6" fill="#C8C8C8"/>
                            <rect y="16" width="6" height="6" fill="#C8C8C8"/>
                            <rect x="9" y="10" width="15" height="2" fill="#C8C8C8"/>
                            <rect x="9" y="18" width="15" height="2" fill="#C8C8C8"/>
                            <rect x="9" y="2" width="15" height="2" fill="#C8C8C8"/>
                        </svg>
                    </button>
                </div>

                <main class="posts posts--tiles" id="postsContainer"></main>
                <div class="no-posts">
                    <h3 class="no-posts__title">No posts found</h3>
                    <p class="no-posts__text">Try changing the date range to see more results.</p>
                </div>

                <div class="load-more">
                    <button class="load-more__btn" type="button">LOAD MORE</button>
                </div>
            </section>
        </main>
    </div>

<script type="module" src="./src/js/main.js"></script>
</body>
</html>
